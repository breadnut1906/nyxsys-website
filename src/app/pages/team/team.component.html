<app-navbar></app-navbar>

<section class="section-container team-section">
    <img class="team-image" src="assets/images/team/team-bg.jpg" alt="team Us" loading="lazy">
    <div class="team-container">
        <div class="team-wrapper">
            <h1 class="team-header team-item" [@slideIn]="isVisible[0] ? 'visible' : 'hidden'">Meet Our Team</h1>
            <p class="team-subheader team-item" [@slideIn]="isVisible[1] ? 'visible' : 'hidden'">
                Passionate Experts Driving Innovation and Success
            </p>
        </div>
    </div>
</section>

<section class="section-container team-list-section">
    <div class="team-list-container">
        <div class="team-list-wrapper">
            <h2>Our Dedicated Team</h2>
            <p>Bringing expertise and collaboration together to drive meaningful innovation.</p>
            <div class="row g-3 w-100 mt-3">
                @for (item of [ 1, 2, 3, 4, 5, 6 ]; track $index) {
                    <div class="col-12 col-md-6">
                        <div class="team-list-content">
                            <img [src]="'assets/images/team/' + item + '.jpg'" [alt]="item + '.jpg'">
                        </div>
                    </div>
                }
            </div>
        </div>
    </div>
</section>

<app-companies></app-companies>

<app-call-to-action></app-call-to-action>

<app-footer></app-footer>
